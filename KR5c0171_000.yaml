front:
  text: 三經同卷孝一
  hash: sha256:fbe7744895d8c826c81548e324e66788073002d802c42524fcfaba2e4b077bbc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0171_HFL_000-001a, image: hfl/0556/0556-004.png}
body:
  text: 大上説玄天大聖真武本傳神呪妙經真武靈應真君增上佑聖尊號册文章獻明肅皇后受上清畢法籙記太上説玄天大聖真武本傳神呪妙經仰啓玄天大聖者北方壬癸至靈神金闕真尊應化身無上將軍號真武威容赫奕太隂君列宿虛危分秀氣雙睛掣電伏羣魔萬騎如雲威九地紫袍金帶按神鋒蒼龜巨蛇捧聖足六丁六甲左右隨八煞將軍前後衛消災降福不思議皈命一心今奉禮爾時紫微大帝於龍漢元年中元之日在太清境上北極宮中向紫微之殿前列諸天之上聖南北二斗東西兩曹洎五方之五星及六宫之六曜二十八宿十二宮神飛天神王無極仙衆咸親帝座肅拱宸威時有玉童傳大帝之勑北方大將玄武將軍冝稟玊皇聖命勑令每月三度統領神兵躬往諸天遍為巡察凡遇邪氣及有妖星逆次流𨇠速須剪戮又遇三元八節甲子庚申一月一辰降於下界録善罰惡輔正除邪濟拔天人祛妖攝毒以副上意切切為之時有真人名曰妙行特離班次竦伏帝前曰臣宿有因緣得聞妙理北方大將玄武將軍巡察天人録善罰惡不知此將應化何因有何神通鬼神降伏願惟大造少悟小聰是時大帝隱几而言妙哉真人能為凡間然其玄武應化之因渺邈難窮希夷莫究蓋乃玄元聖祖護度天人應化之身神明之妙蓋無形之為道非有象之可言變化億千虛無難測且玄元聖祖八十一次顯為老君八十二次變為玄武故知玄武者老君變化之身武曲顯靈之驗本虛危之二宿交水火之兩精或挂甲而衣袍或穿靴而跣足常披紺髮每仗神鋒聲震九天威命四部擁之者皂纛玄霧躡之者蒼龜巨蛇神兵神將從之者皆五千萬衆玊童玊女侍之者各二十四行授北帝之靈符佩乾元之寶印驅之有雷公電母御之有風伯雨師衛前後則八煞將軍隨左右則六甲神將天罡太一率於驅使之前社令城隍悉處指揮之下有妖皆剪無善不扶朝金闕而赴昆崘開天門而閉地户杳冥恍惚審察窮通居其壬癸之方助有甲庚之將或乘玄駿或跨蒼虬目閃電光眉橫雲陳身長千丈頂戴三台其動也山水蒙其靜也地天泰以茲顯化故乃神通是時真人再拜稽首曰臣之慶幸荷此綸辭然其玄武之將軍乃玄元之應化其始之迹其事云何願賜詳言以開蒙鄙於是紫微大帝敷以玄言釋彼所因解無上事昔大羅境上無欲天宫淨樂國王善勝皇后夢而吞日覺乃懷孕其毋氣不納邪日常行道既經一十四月乃及四百餘辰於開皇元年甲辰之歲三月三日午時降誕於王宫相貌殊倫後既長成遂捨家辭父母入武當山修道四十二年功成果滿白日升天玉皇有詔封為太玄鎮於北方顯迹之因自此始也真人稽首再拜白紫微大帝曰玊皇詔封必有妙旨敢問大略以開小聰爾時告於妙行曰天書祕密何以談揚恐泄天機深為不便大梵隱語奚使衆聞妙行真人拜首稽首復奏言曰臣雖緣薄聖必思寬曲念衆真特垂大便苟輕泄慢當墮惡途萬劫千生受為下鬼是時紫微大帝念此真人著意勤拳再三請問遂宣帝勑以示衆真夫此袐言金書篆字大方一丈號曰天符見之者永處天仙聆之者不歷地獄其詔文曰金闕昊天三省門下牒奉勑學仙聖童淨樂國子惟卿玄元之化天一之尊不言而教莫知其神渺渺劫仭綿綿若存虛心實腹和光同塵鑿開造化朴散胚渾六百萬歲八十二身曲全枉直窪盈弊新生隂育陽起死成人其功不恃其德乃真今冝再顯永鎮北旻上罰逆象下滅妖氛掌握圖籙攝制魔蹤帝真靈會驅神駕龍甲庚之將贊衛爾勳周環六合普福兆民道參天地萬神所推可特拜太玄元帥領元和遷校府公事册到奉行紫微乃言告真人曰此文者玊皇袐勑天帝微宣不可輕傳恐遭降責真人稽首又白帝言臣聞玄武將軍神通至大不居諸位而鎮北方妙用之因神眀之契必有奧旨願釋鄙懷大帝遺音告真人曰天中北上衆曜拱之以匪至神孰能鎮遏真人乃啓於紫微若有天人志心欽仰其於福利有所得乎大帝曰此神將是歲每月六日十六日二十六日諸天審察十洞巡遊及正月七日二月八日三月九日四月四日五月五日六月七日七月七日八月十三日九月九日十月二十一日十一月七日十二月二十七日下降人間剪滅邪魔驅除瘟瘧保人度壽以全天命其有氣正心純忠全孝盡名書王簡保舉升仙更有玄科莫可併述真人稽首再拜白紫微大帝曰顯化之因則聞命矣天人欽仰玄武將軍作何皈依設何方便而得福利幸賜一言大帝是時告真人曰天地之內能有志心奉祀玄武一生之內不食腥羶自斃毒傷厭穢之物及於蕌菜大蒜明荽耽媱嗜欲扶尸接産苦能斷得方可志心凡臨下降之辰皆有禎祥之慶其夜先當澡瀹身心不汩思慮至五更躬然香燭淨果棗湯位列有三志純于一稽首禱告無願不從然乃淨思虔誠誦其神呪北方玄天杳杳神君億千變化玄武靈真騰天倒地驅雷奔雲隊仗千萬掃蕩妖氛雷公侍從玉女將軍鬼神降伏龍虎濳奔威鎮五嶽萬靈咸遵鳴鐘擊鼓遊行乾坤收捕逆鬼摧斬魔羣除邪輔正道氣常臻急急如元始上帝律令勑太隂化生水位之精虛危上應龜蛇合形盤遊九地統攝萬靈無幽不察無願不成劫終劫始剪伐魔精救護羣品家國咸寧數終未甲妖氛流行上帝有勑吾故降靈蕆揚正教蕩邪辟兵化洽黎兆協贊中興敢有小鬼欲來現形吾目一視五嶽摧傾急急如太玄律令勑妙行真人曰功德之妙顯應之因幸以竊聞頓開迷懵其有蠻夷之輩愚蠢之人耳縱得聞心無所信設有果報可示一言紫微大帝曰雖云愚蠢必識炎涼縱處蠻夷須知苦樂信則神魂清爽違則禍患縈仍致使冨乏兒孫貧多子息或男值兵戈而殞命或女罹淫孕而傷生常出入於訟庭每沈淪於苦海銷磨産業耗散資財蓋緑自咎故獲斯因此神將所在獰妖縮首邪道遁邢是以奉之者福逐雲生災隨電散汝因懇問吾故泄機陳道紀於微源使天民之巨慶言雖簡要欲汝曉明非乃至人祕之冝也真人曰妙用之理可得一聞大帝曰昔永壽元年上元之日元始天尊於八景天宫向五雲座上與三十六天上帝七十二福地真人無量飛天大神無極長生大聖金童玊女九鳳八鸞侍衛於輝光羅列於左右八音自響衆聖咸欣嚴聽天尊説至真之妙法肅凊道氣繞無上之玄元方妙理之研精俄天門之東北七聲大震十目齊觀覩下界之𡨚魔結衝天之穢氣衆真默爾大道寂然時妙行真人問所由於元始既敷妙法合集殊祥是何異因於此輒冒可垂奧旨以解衆疑大帝曰下元生人皆稟至道受氤氲之清氣以扶衛於赤身今以劫運將終妖魔漸盛唯從邪道不省本源樂奉邪神諂求餘福昏迷洗亂貪欲剛強不義不仁不忠不孝今為六天魔王五府瘟曹不以尊卑枉致傷害或老或少或女或男未盡天年徒違人世本非死限故使魂孤怨恨上衝盤結不散此之暴卒實可悲哀妙行真人上白元始衆真矜彼衆生何緣度之天尊乃叩齒一通流光萬里北方命召太玄將軍剪戳衆妖救度羣品真人曰不審此將而以何緣位鎮北方威降下鬼掃蕩妖氛大帝曰此神未開造化先稟神靈易號假名度人濟物不伐其善不矜其能荷其玉帝封為玄武真人曰焉得此將而往下方咸度羣品免遭橫死亡者解脫存者康寧天尊以飛符召之此將玄武蒙詔神兵從行至不夜之丹墀覩強名之大道作禮長跪稽首進言今日何緣蒙符特召慈顔幸覩妙旨何歸竦伏軒墀俯膺令命天尊告曰吾觀下界怨氣衝天大衆咸驚髙真矜愍卿之往彼汝則欽哉玄武於是奉命辭天回光返照披髮跣足降龜躡蛇仙仗雷奔天丁翊衛俄於倐歘遍彼乾坤剪酷毒之妖魔捕恣橫之瘟疫幽魂生界苦病離痾人鬼分離𡨚家解脫黎民安泰國土清平玄武再覩天尊具言道力功成事遂濁降清升却返祥光復還本位交乾布斗激坤指罡上佐天關而作呪曰太初太易無象無形莫知重濁孰辨輕清吾於混沌分其昏明天得以健地得以寧民得以養物得以萌邪得以正神得以靈三才之內萬類咸亨大道既散仁義乃興禮樂既作姦邪斯行六義或失四民有爭上不寬恕下不忠貞或魔或鬼或妖或精恣橫荼毒干擾生民全家染患纍歲刑名財物耗散骨肉伶仃性命往逝災禍相縈穢雜之氣上逹天庭天尊有命令吾安平有妖皆剪無鬼不烹瘟疫之吏束首服曆鬼精滅爽邪魔摧傾吾有十億烈士五千萬兵天上天下從吾降升拒吾者滅奉吾者生惡吾者辱敬吾者榮禮吾者夀非吾者薨吾有此令人鬼咸聽急急如太玄律令攝爾時妙行真人無量飛天神王真仙大衆聞是説已踊躍作禮讚嘆功德祕籙琅函後有謫仙傳於人世志道之士稽首奉行太上説玄天大聖真武本傳神呪妙經
